<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reminders App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Reminders</h1>

    <div class="form-card">
      <h2>Add Task</h2>
      <div class="form-group">
        <input type="text" id="taskInput" placeholder="Task description..." />
      </div>
      <div class="form-row">
        <input type="text" id="personInput" placeholder="Assign to person..." />
        <button id="addBtn" onclick="addTask()">Add Task</button>
      </div>
      <p id="errorMsg" class="error hidden"></p>
    </div>

    <div class="filters">
      <label for="filterPerson">Filter by person:</label>
      <select id="filterPerson" onchange="renderTasks()">
        <option value="">Everyone</option>
      </select>
    </div>

    <div id="taskList" class="task-list"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
